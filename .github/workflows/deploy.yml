name: RiceMill CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # ── Step 1: Checkout code ─────────────────────────────────────
    - name: Checkout code
      uses: actions/checkout@v3

    # ── Step 2: Login to Docker Hub ───────────────────────────────
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # ── Step 3: Build & Push API image ────────────────────────────
    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: ./RiceMillApi
        dockerfile: ./RiceMillApi/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/ricemill-api:latest

    # ── Step 4: Build & Push Frontend image ───────────────────────
    - name: Build and push Frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./rice-mill-ui
        dockerfile: ./rice-mill-ui/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/ricemill-frontend:latest

    # ── Step 5: Deploy to EC2 ─────────────────────────────────────
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/RiceMill-Accounts-Management-System

          # Pull latest images
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ricemill-api:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ricemill-frontend:latest

          # Restart containers with new images
          docker-compose down
          docker-compose up -d

          # Clean up old unused images
          docker image prune -f

          echo "Deployment complete!"
